<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Marathon Training">
    <title>16-Week Hybrid Training Programme</title>
    <style>
        :root {
            --color-bg-primary: #fcfcf9;
            --color-surface: #fffffd;
            --color-text: #13343b;
            --color-text-secondary: #626c71;
            --color-primary: #21808d;
            --color-primary-hover: #1d7480;
            --color-border: rgba(94, 82, 64, 0.2);
            --color-card-border: rgba(94, 82, 64, 0.12);
            --color-success: #21808d;
            --color-run: rgba(59, 130, 246, 0.08);
            --color-lift: rgba(245, 158, 11, 0.08);
            --color-rest: rgba(34, 197, 94, 0.08);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg-primary: #1f2121;
                --color-surface: #262828;
                --color-text: #f5f5f5;
                --color-text-secondary: rgba(167, 169, 169, 0.7);
                --color-primary: #32b8c6;
                --color-primary-hover: #2da6b2;
                --color-border: rgba(119, 124, 124, 0.3);
                --color-card-border: rgba(119, 124, 124, 0.2);
                --color-success: #32b8c6;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg-primary);
            color: var(--color-text);
            line-height: 1.6;
            padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 16px) env(safe-area-inset-bottom, 16px) env(safe-area-inset-left, 16px);
            padding-top: max(16px, env(safe-area-inset-top));
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            max-width: 100%;
            margin: 0;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .header {
            text-align: center;
            margin-bottom: 16px;
            padding: 20px 16px;
            background: var(--color-surface);
            border-radius: 16px;
            border: 1px solid var(--color-card-border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--color-text);
            font-weight: 700;
        }

        .header-subtitle {
            font-size: 13px;
            color: var(--color-text-secondary);
            margin-bottom: 12px;
        }

        .date-display {
            font-size: 15px;
            color: var(--color-text-secondary);
            margin-bottom: 12px;
        }

        .week-info {
            display: inline-block;
            padding: 8px 16px;
            background: var(--color-run);
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-primary);
        }

        .phase-badge {
            display: inline-block;
            padding: 4px 12px;
            background: var(--color-lift);
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--color-primary);
            margin-left: 8px;
        }

        .workout-card {
            background: var(--color-surface);
            border: 1px solid var(--color-card-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .workout-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--color-text);
        }

        .workout-subtitle {
            font-size: 14px;
            color: var(--color-text-secondary);
            margin-bottom: 20px;
        }

        .exercise {
            padding: 16px;
            margin-bottom: 12px;
            background: var(--color-bg-primary);
            border-radius: 12px;
            border-left: 4px solid var(--color-primary);
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .exercise-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--color-text);
            line-height: 1.4;
        }

        .exercise-details {
            font-size: 14px;
            color: var(--color-text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .exercise-sets {
            font-weight: 600;
            color: var(--color-primary);
            font-size: 15px;
        }

        .exercise-notes {
            font-size: 13px;
            color: var(--color-text-secondary);
            font-style: italic;
            margin-top: 6px;
            line-height: 1.5;
        }

        .rest-day {
            text-align: center;
            padding: 48px 20px;
            background: var(--color-rest);
            border-radius: 16px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .rest-day h2 {
            font-size: 32px;
            margin-bottom: 12px;
            color: var(--color-success);
            font-weight: 700;
        }

        .rest-day p {
            font-size: 16px;
            color: var(--color-text-secondary);
            line-height: 1.6;
        }

        .warm-up-section {
            background: var(--color-lift);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .warm-up-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--color-text);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .warm-up-item {
            font-size: 14px;
            color: var(--color-text-secondary);
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
            line-height: 1.5;
        }

        .warm-up-item:before {
            content: "•";
            position: absolute;
            left: 8px;
            color: var(--color-primary);
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .btn {
            flex: 1;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: var(--color-primary);
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(33, 128, 141, 0.2);
            -webkit-appearance: none;
            appearance: none;
            touch-action: manipulation;
            min-height: 50px;
        }

        .btn:active {
            transform: scale(0.97);
            background: var(--color-primary-hover);
            box-shadow: 0 1px 4px rgba(33, 128, 141, 0.3);
        }

        .btn-secondary {
            background: var(--color-surface);
            color: var(--color-primary);
            border: 2px solid var(--color-primary);
            box-shadow: none;
        }

        .btn-secondary:active {
            background: var(--color-run);
        }

        .pace-info {
            margin-top: 20px;
            padding: 16px;
            background: var(--color-run);
            border-radius: 12px;
            border-left: 4px solid var(--color-primary);
        }

        .pace-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pace-text {
            font-size: 14px;
            color: var(--color-text-secondary);
            line-height: 1.6;
        }

        html {
            scroll-behavior: smooth;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .workout-card, .rest-day {
            animation: fadeIn 0.3s ease;
        }

        .btn:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏃‍♂️💪 Hybrid Training</h1>
        <div class="header-subtitle">Upper Body Hypertrophy + Sub-3:30 Marathon</div>
        <div class="date-display" id="dateDisplay"></div>
        <div>
            <span class="week-info" id="weekInfo"></span>
            <span class="phase-badge" id="phaseInfo"></span>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="changeDay(-1)">← Previous</button>
        <button class="btn btn-secondary" onclick="goToToday()">Today</button>
        <button class="btn" onclick="changeDay(1)">Next →</button>
    </div>

    <div id="workoutContainer"></div>

    <script>
        let programStart;
        let currentDate = new Date();
        let workoutProgram = null;

        async function fetchWorkoutProgram() {
            try {
                const response = await fetch('workout-program.json');
                if (!response.ok) {
                    throw new Error(`Failed to fetch workout program: ${response.status}`);
                }
                const data = await response.json();
                programStart = new Date(data.programStart);
                workoutProgram = data;
                renderWorkout();
            } catch (error) {
                document.getElementById('workoutContainer').innerHTML =
                    `<div class="rest-day"><h2>Error</h2><p>Could not load workout program.<br>${error.message}</p></div>`;
            }
        }

        function calculateWeekNumber(date) {
            const diffTime = date - programStart;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const weekNum = Math.ceil(diffDays / 7);
            return Math.max(1, Math.min(16, weekNum));
        }

        function getPhase(weekNum) {
            if (weekNum <= 12) return 2;
            return 3;
        }

        function getPhaseName(phase) {
            return workoutProgram.phases[phase].name;
        }

        function getDayName(date) {
            const days = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
            return days[date.getDay()];
        }

        function formatDate(date) {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        function renderWorkout() {
            if (!workoutProgram) return;
            const dayName = getDayName(currentDate);
            const weekNum = calculateWeekNumber(currentDate);
            const phase = getPhase(weekNum);
            const phaseName = getPhaseName(phase);

            document.getElementById('dateDisplay').textContent = formatDate(currentDate);
            document.getElementById('weekInfo').textContent = `Week ${weekNum}`;
            document.getElementById('phaseInfo').textContent = phaseName;

            const container = document.getElementById('workoutContainer');
            const startWeek = workoutProgram.startWeek || 8;

            // Pre-programme weeks
            if (weekNum < startWeek) {
                container.innerHTML = `<div class="rest-day"><h2>Programme starts Week ${startWeek}</h2><p>Your training programme begins on Week ${startWeek}.<br>Current week: ${weekNum}</p></div>`;
                return;
            }

            // Sunday — always rest
            if (dayName === 'sunday') {
                container.innerHTML = `<div class="rest-day"><h2>🛋️ Complete Rest</h2><p>Recovery is where adaptation happens.<br>Sleep 7–9 hours. You've earned it.</p></div>`;
                return;
            }

            // Saturday Race Day (Week 16)
            if (dayName === 'saturday' && weekNum === 16 && workoutProgram.saturday.race && workoutProgram.saturday.race[16]) {
                const race = workoutProgram.saturday.race[16];
                let html = `<div class="workout-card">
                    <div class="workout-title">${race.title}</div>
                    <div class="workout-subtitle">${race.distance} — ${race.target}</div>
                    <div class="pace-info">
                        <div class="pace-title">🎯 Pacing Strategy</div>`;
                race.strategy.forEach(item => {
                    html += `<div class="warm-up-item">${item}</div>`;
                });
                html += `</div>
                    <div class="pace-info" style="margin-top: 12px;">
                        <div class="pace-title">💡 Race Day Notes</div>
                        <div class="pace-text">${race.notes}</div>
                    </div>
                </div>`;
                container.innerHTML = html;
                return;
            }

            let html = '';

            // Monday — Leg Activation
            if (dayName === 'monday') {
                let phaseKey;
                if (weekNum <= 12) phaseKey = 'phase2';
                else if (weekNum <= 14) phaseKey = 'phase3';
                else phaseKey = 'phase3late';
                const workout = workoutProgram.monday.lifting[phaseKey];
                html = renderLiftingWorkout(workout);
            }

            // Tuesday — Easy Run
            if (dayName === 'tuesday') {
                const run = workoutProgram.tuesday.running[weekNum];
                html = renderRunningWorkout(run);
            }

            // Wednesday — Upper Push
            if (dayName === 'wednesday') {
                const phaseKey = `phase${phase}`;
                const lifting = workoutProgram.wednesday.lifting[phaseKey];
                html = renderLiftingWorkout(lifting);
            }

            // Thursday — Tempo / MP Run
            if (dayName === 'thursday') {
                const run = workoutProgram.thursday.running[weekNum];
                if (run) {
                    html = renderRunningWorkout(run);
                }
            }

            // Friday — Upper Pull
            if (dayName === 'friday') {
                const phaseKey = `phase${phase}`;
                const lifting = workoutProgram.friday.lifting[phaseKey];
                html = renderLiftingWorkout(lifting);
            }

            // Saturday — Long Run
            if (dayName === 'saturday') {
                const run = workoutProgram.saturday.running[weekNum];
                if (run) {
                    html = renderRunningWorkout(run);
                }
            }

            container.innerHTML = html;
        }

        function renderLiftingWorkout(workout) {
            let html = `<div class="workout-card">
                <div class="workout-title">${workout.title}</div>
                <div class="workout-subtitle">${workout.subtitle}</div>`;
            
            workout.exercises.forEach(ex => {
                html += `<div class="exercise">
                    <div class="exercise-name">${ex.name}</div>
                    <div class="exercise-details">
                        <span class="exercise-sets">${ex.sets}</span>
                        ${ex.rest ? `<span>• Rest: ${ex.rest}</span>` : ''}
                    </div>
                    ${ex.notes ? `<div class="exercise-notes">${ex.notes}</div>` : ''}
                </div>`;
            });

            html += `</div>`;
            return html;
        }

        function renderRunningWorkout(run, sessionLabel = "") {
            if (!run) return '';
            
            let html = `<div class="workout-card">
                ${sessionLabel ? `<div class="workout-subtitle">${sessionLabel}</div>` : ''}
                <div class="workout-title">🏃‍♂️ ${run.session}</div>
                <div class="workout-subtitle">${run.distance}</div>
                <div class="pace-info">
                    <div class="pace-title">🎯 Pace/Effort</div>
                    <div class="pace-text">${run.pace}</div>
                </div>`;
            
            if (run.notes) {
                html += `<div class="pace-info" style="margin-top: 12px;">
                    <div class="pace-title">💡 Notes</div>
                    <div class="pace-text">${run.notes}</div>
                </div>`;
            }

            html += `</div>`;
            return html;
        }

        function changeDay(offset) {
            currentDate.setDate(currentDate.getDate() + offset);
            renderWorkout();
        }

        function goToToday() {
            currentDate = new Date();
            renderWorkout();
        }

        document.addEventListener('touchmove', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        fetchWorkoutProgram();
    </script>
</body>
</html>
